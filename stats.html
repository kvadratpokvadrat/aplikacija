<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Statistika</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js?v=final"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body data-page="stats">

<header class="topbar">
  <div class="logo">CRM</div>

  <div class="top-actions">

    <div class="notif-wrap">
      <button id="notifBtn" class="notif-btn">
        🔔
        <span id="notifBadge" class="notif-badge hidden">0</span>
      </button>

      <div id="notifDropdown" class="notif-dropdown hidden">
        <div class="notif-header"><b>Obaveštenja</b></div>
        <div id="notifList" class="notif-list"></div>
      </div>
    </div>

    <span id="whoami"></span>
    <button id="logoutBtn">Logout</button>

  </div>
</header>

<div class="layout">

<aside class="sidebar">
  <nav>
    <a href="calls.html">📞 Pozivi</a>
    <a href="fields.html">🚗 Tereni</a>
    <a href="stats.html" class="active">📊 Statistika</a>
  </nav>
</aside>

<main class="main">

<div class="card">
  <h3>Statistika</h3>
  <div id="stats"></div>
</div>

<div class="card">
  <button id="toggleChart">Grafikon</button>
  <div id="chartWrap" class="hidden">
    <canvas id="chart"></canvas>
  </div>
</div>

</main>
</div>

</body>
</html>
