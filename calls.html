<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Pozivi</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js?v=final"></script>
</head>

<body data-page="calls">

<header class="topbar">
  <div class="logo">CRM</div>

  <div class="top-actions">

    <div class="notif-wrap">
      <button id="notifBtn" class="notif-btn">
        🔔
        <span id="notifBadge" class="notif-badge hidden">0</span>
      </button>

      <div id="notifDropdown" class="notif-dropdown hidden">
        <div class="notif-header"><b>Obaveštenja</b></div>
        <div id="notifList" class="notif-list"></div>
      </div>
    </div>

    <span id="whoami"></span>
    <button id="logoutBtn">Logout</button>

  </div>
</header>

<div class="layout">

<aside class="sidebar">
  <nav>
    <a href="calls.html" class="active">📞 Pozivi</a>
    <a href="fields.html">🚗 Tereni</a>
    <a href="stats.html">📊 Statistika</a>
  </nav>
</aside>

<main class="main">

<div id="loginView" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="appView" class="hidden">

<div class="card">
  <h3>Dodaj poziv</h3>

  <input id="ime" placeholder="Ime">
  <input id="sifra" placeholder="Šifra">
  <input id="adresa" placeholder="Adresa">
  <input id="telefon" placeholder="Telefon">
  <input type="date" id="datumPoziva">

  <select id="ponudaAgent">
    <option value="">Agent</option>
    <option>Marija</option>
    <option>Slavko</option>
    <option>Jovan</option>
  </select>

  <input id="ishod" placeholder="Ishod">
  <button id="addCall">Dodaj</button>
</div>

<div class="card">
  <input id="search" placeholder="Pretraga">

  <table>
    <thead>
      <tr>
        <th>Ime</th>
        <th>Telefon</th>
        <th>Agent</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="callsTable"></tbody>
  </table>
</div>

</div>

</main>
</div>

</body>
</html>
